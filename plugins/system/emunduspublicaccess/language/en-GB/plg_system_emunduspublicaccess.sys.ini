PLG_SYSTEM_EMUNDUSPUBLICACCESS_PARAM_SESSION_TTL_DESC="Maximum duration in minutes for a public access session. After this delay, the user must re-authenticate with their token. Default: 30 minutes. Min: 5, Max: 1440 (24h)."
