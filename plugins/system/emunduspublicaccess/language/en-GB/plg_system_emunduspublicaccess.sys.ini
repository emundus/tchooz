PLG_SYSTEM_EMUNDUSPUBLICACCESS="eMundus - Public Access"
PLG_SYSTEM_EMUNDUSPUBLICACCESS_DESCRIPTION="Handles token-based authentication for public application files. Validates access tokens from URL parameters and sets up a temporary system user session to allow guests to fill public forms."
PLG_SYSTEM_EMUNDUSPUBLICACCESS_PARAM_TOKEN_NAME="Token Parameter Name"
PLG_SYSTEM_EMUNDUSPUBLICACCESS_PARAM_TOKEN_NAME_DESC="The URL parameter name used to pass the access token. Default: access_token"
